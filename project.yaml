subskills:
  - name: solidworks-vibecad
    status: experimental
    path: subskills/solidworks-vibecad
    summary: 自然语言需求到参数化设计计划、制造规则检查、执行摘要和审查门禁。
  - name: solidworks-fillet-chamfer-cnc
    status: stable
    path: subskills/solidworks-fillet-chamfer-cnc
    summary: CNC 安装座、连接块、支架、多圆角/倒角、孔槽和减重口袋。
  - name: solidworks-threaded-holes
    status: stable
    path: subskills/solidworks-threaded-holes
    summary: M3-M12 螺纹孔、攻丝底孔、孔口倒角、螺纹属性和 STEP 输出。
